<p class="text-muted mb-3 ms-3">Total characters: <strong>{{ characters().length }}</strong></p>

@if (characters().length === 0) {
<div class="alert alert-warning">Could not connect to the API.</div>
} @else {
<div class="row row-cols-1 row-cols-md-3 g-4">
    @for (character of characters(); track $index) {
    <div class="col">
        <div class="card h-100 shadow-sm border">
            <img src="{{ character.img }}" class="card-img-top" alt="{{ character.name }}"
                style="object-fit: contain; height: 200px; background-color: #f8f9fa;"
                (error)="$event.target.src='https://placehold.co/300x200?text=No+Image'">
            <div class="card-body">
                <h5 class="card-title mb-2">{{ character.name }}</h5>
                <div class="d-flex flex-wrap gap-1">
                    <span class="badge bg-primary">{{ character.role }}</span>
                    <span class="badge bg-info text-dark">{{ character.element }}</span>
                    <span class="badge bg-warning text-dark">{{ character.rarity }}</span>
                    <span class="badge bg-success">{{ character.region }}</span>
                </div>
            </div>
            <div class="card-footer d-flex justify-content-end">
                <button class="btn btn-outline-danger btn-sm" (click)="delete(character._id)">Delete</button>
            </div>
        </div>
    </div>
    }
</div>
}
