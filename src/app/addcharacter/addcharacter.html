<div class="card bg-light border mb-4">
    <div class="card-body">
        <h5 class="card-title mb-3">Add Character</h5>
        <form (ngSubmit)="addItem()">
            <div class="row g-2 mb-2">
                <div class="col-md-6">
                    <input class="form-control" [(ngModel)]="name" name="name" placeholder="Name" required>
                </div>
                <div class="col-md-6">
                    <input class="form-control" [(ngModel)]="role" name="role" placeholder="Role" required>
                </div>
            </div>
            <div class="row g-2 mb-2">
                <div class="col-md-6">
                    <input class="form-control" [(ngModel)]="element" name="element" placeholder="Element" required>
                </div>
                <div class="col-md-6">
                    <input class="form-control" [(ngModel)]="region" name="region" placeholder="Region" required>
                </div>
            </div>
            <div class="row g-2 mb-3">
                <div class="col-md-6">
                    <input class="form-control" [(ngModel)]="rarity" name="rarity" placeholder="Rarity (e.g. 5★)"
                        required>
                </div>
                <div class="col-md-6">
                    <input class="form-control" [(ngModel)]="img" name="img" placeholder="Image URL" required>
                </div>
            </div>
            <button type="submit" class="btn btn-dark px-4">Add Character</button>
        </form>
    </div>
</div>
