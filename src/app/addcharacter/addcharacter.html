<form (ngSubmit)="addItem()" class="mt-4">
    <h4>Add Character</h4>

    <div class="mb-2">
        <input class="form-control" [(ngModel)]="name" name="name" placeholder="Name" required>
    </div>
    <div class="mb-2">
        <input class="form-control" [(ngModel)]="role" name="role" placeholder="Role" required>
    </div>
    <div class="mb-2">
        <input class="form-control" [(ngModel)]="element" name="element" placeholder="Element" required>
    </div>
    <div class="mb-2">
        <input class="form-control" [(ngModel)]="img" name="img" placeholder="Image URL" required>
    </div>

    <button type="submit" class="btn btn-primary">Add</button>
</form>
